<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">
  <title>美食街区 - Yummi</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/shop.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/social-map.css">
</head>
<body class="map-body">
  <div class="map-top-bar">
    <div class="fish-coin" id="fishCoinBar" title="小鱼干币"></div>
    <button type="button" class="top-help-btn" id="topOrderHelpBtn" title="查看引导" aria-label="查看引导">?</button>
  </div>

  <div class="map-page" id="mapPage">
    <header class="map-header">
      <h1 class="map-title">美食街区</h1>
      <span class="map-subtitle">宁静小巷，风味相逢</span>
      <div class="map-actions">
        <button type="button" class="map-circle" id="mapCircleBtn">食物圈</button>
        <button type="button" class="map-circle map-circle--friend" id="mapAddFriendBtn">添加好友</button>
        <button type="button" class="map-circle" id="mapFriendsBtn">好友</button>
      </div>
    </header>

    <main class="map-main" id="mapMain">
      <div class="map-street" id="mapStreet"></div>
    </main>

    <div class="map-preview" id="mapPreview" aria-hidden="true">
      <div class="map-preview__overlay" id="mapPreviewOverlay"></div>
      <div class="map-preview__card" id="mapPreviewCard">
        <button type="button" class="map-preview__close" id="mapPreviewClose" aria-label="关闭">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
        <img class="map-preview__img" id="mapPreviewImg" src="" alt="">
        <div class="map-preview__body">
          <h2 class="map-preview__name" id="mapPreviewName"></h2>
          <span class="map-preview__tag" id="mapPreviewTag"></span>
          <p class="map-preview__desc" id="mapPreviewDesc"></p>
          <button type="button" class="map-preview__enter" id="mapPreviewEnter">进入店铺</button>
        </div>
      </div>
    </div>

    <div class="map-friend" id="mapFriendPanel" aria-hidden="true">
      <div class="map-friend__overlay" id="mapFriendOverlay"></div>
      <section class="map-friend__sheet" role="dialog" aria-modal="true" aria-labelledby="mapFriendTitle">
        <div class="map-friend__header">
          <div>
            <p class="map-friend__eyebrow">YUMMY CODE</p>
            <h2 class="map-friend__title" id="mapFriendTitle">添加好友</h2>
          </div>
          <button type="button" class="map-friend__close" id="mapFriendClose" aria-label="关闭">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
        <div class="map-friend__entry">
          <label class="map-friend__label" for="mapFriendCodeInput">朋友的 YUMMY码</label>
          <div class="map-friend__row">
            <input
              type="text"
              class="map-friend__input"
              id="mapFriendCodeInput"
              placeholder="粘贴或输入朋友的 YUMMY码"
              autocomplete="off"
              autocapitalize="off"
              spellcheck="false"
            >
            <button type="button" class="map-friend__submit" id="mapFriendSubmit">提交</button>
          </div>
          <p class="map-friend__status" id="mapFriendStatus" aria-live="polite"></p>
        </div>
        <div class="map-friend__result" id="mapFriendResult"></div>
      </section>
    </div>
  </div>

  <nav id="tab-bar" class="tab-bar" role="tablist" aria-label="主导航">
    <button type="button" class="tab-bar__item" role="tab" aria-selected="false" data-tab="order" onclick="location.href='index.html?tab=order'">
      <span class="tab-bar__icon-wrap" data-tab="order">
        <svg class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M8 4.5c0 1.4-.7 2.4-.9 3.8"/>
          <path d="M12 3.5c0 1.6-.7 2.6-.9 4.2"/>
          <path d="M16 4.5c0 1.4-.7 2.4-.9 3.8"/>
          <path d="M4 11h16"/>
          <path d="M5 11c0 5.8 3.2 8.5 7 8.5s7-2.7 7-8.5"/>
          <path d="M17.5 2.5l2.5 7.5"/>
          <path d="M20 2.5l-3 7.5"/>
        </svg>
      </span>
      <span class="tab-bar__label">点餐</span>
    </button>
    <button type="button" class="tab-bar__item" role="tab" aria-selected="false" data-tab="dress" onclick="location.href='index.html?tab=dress'">
      <span class="tab-bar__icon-wrap" data-tab="dress">
        <svg class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 15.5v5"/>
          <path d="M12 15.5c-2.2 0-4.2-1.6-6.2-3.6-1.4-1.4-1.1-3.3 0-4.3 1.6-1.2 3.3.3 4.4 1.8"/>
          <path d="M12 15.5c2.2 0 4.2-1.6 6.2-3.6 1.4-1.4 1.1-3.3 0-4.3-1.6-1.2-3.3.3-4.4 1.8"/>
          <circle cx="12" cy="15.5" r="1.3" fill="currentColor" stroke="none"/>
          <path d="M8.5 20.2c1.6-.9 3.1-.9 3.5-.9"/>
          <path d="M15.5 20.2c-1.6-.9-3.1-.9-3.5-.9"/>
          <path d="M9 9.5l3-2.5 3 2.5"/>
        </svg>
      </span>
      <span class="tab-bar__label">装扮</span>
    </button>
    <button type="button" class="tab-bar__item tab-bar__item--active" role="tab" aria-selected="true" data-tab="social">
      <span class="tab-bar__icon-wrap" data-tab="social">
        <svg class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="8.5" cy="7.5" r="2.8"/>
          <path d="M4 17.5c0-3.6 2.1-5.5 4.5-5.5s4.5 1.9 4.5 5.5"/>
          <circle cx="16.5" cy="8.5" r="2.3"/>
          <path d="M12.8 17.5c0-3 1.9-4.8 3.7-4.8s3.5 1.8 3.5 4.8"/>
          <path d="M19.5 5.5h1.5"/>
          <path d="M20.25 4.75v1.5"/>
        </svg>
      </span>
      <span class="tab-bar__label">社交</span>
    </button>
  </nav>

  <script src="js/data/foods.js"></script>
  <script src="js/data/food-taste-db.js"></script>
  <script src="js/data/food-taste.js"></script>
  <script src="js/data/food-personality.js"></script>
  <script src="js/modules/dress/config.js"></script>
  <script src="js/modules/dress/state.js"></script>
  <script src="js/data/yummy-code.js"></script>
  <script src="js/fish-coins.js"></script>
  <script src="js/core/guides.js"></script>
  <script src="js/social-map-guide.js"></script>
  <script src="js/social-map.js"></script>
</body>
</html>
