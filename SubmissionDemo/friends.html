<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">
  <title>好友 - Yummi</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/shop.css">
  <link rel="stylesheet" href="css/friends.css">
</head>
<body class="friends-body">
  <div class="fish-coin" id="fishCoinBar" title="小鱼干币"></div>

  <div class="friends-page" id="friendsPage">
    <header class="friends-header">
      <a href="social-map.html" class="friends-back" aria-label="返回">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        <span>返回</span>
      </a>
      <h1 class="friends-title">好友</h1>
      <p class="friends-subtitle">与小猫伙伴们相遇的地方</p>
    </header>

    <main class="friends-main" id="friendsMain">
      <div class="friends-list" id="friendsList"></div>
    </main>
  </div>

  <!-- 拜访视图 — 店铺内部 + 小猫 -->
  <div class="friends-visit" id="friendsVisit" aria-hidden="true">
    <div class="friends-visit__overlay" id="friendsVisitOverlay"></div>
    <div class="friends-visit__stage">
      <button type="button" class="friends-visit__back" id="friendsVisitBack" aria-label="返回">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        <span>返回</span>
      </button>
      <div class="friends-visit__shop" id="friendsVisitShop"></div>
      <div class="friends-visit__cat-wrap" id="friendsVisitCatWrap">
        <img class="friends-visit__cat" id="friendsVisitCat" src="" alt="">
        <span class="friends-visit__cat-name" id="friendsVisitCatName"></span>
      </div>
      <!-- 小猫交互面板 -->
      <div class="friends-catbar" id="friendsCatBar" aria-hidden="true">
        <div class="friends-catbar__arrow"></div>
        <div class="friends-catbar__body">
          <button type="button" class="friends-catbar__btn friends-catbar__btn--feed" data-cataction="feed" id="friendsCatFeed">🐟 投喂</button>
          <button type="button" class="friends-catbar__btn friends-catbar__btn--pet" data-cataction="pet" id="friendsCatPet">🖐 抚摸</button>
        </div>
      </div>
      <div class="friends-visit__label" id="friendsVisitLabel"></div>
      <div class="friends-visit__dock">
        <button type="button" class="friends-visit__dock-btn friends-visit__dock-btn--primary" id="friendsVisitPref">
          <span>🔖</span><span>查看偏好</span>
        </button>
        <button type="button" class="friends-visit__dock-btn" id="friendsVisitFeed">
          <span>🐟</span><span>投喂</span>
        </button>
      </div>
    </div>
  </div>

  <!-- 口味比对弹窗 -->
  <div class="shop-compare friends-compare" id="friendsComparePanel" aria-hidden="true">
    <div class="shop-compare__overlay" id="friendsCompareOverlay"></div>
    <section class="shop-compare__sheet" role="dialog" aria-modal="true" aria-labelledby="friendsCompareTitle">
      <div class="shop-compare__header">
        <div>
          <p class="shop-compare__eyebrow">YUMMY CODE MATCH</p>
          <h2 class="shop-compare__title" id="friendsCompareTitle">口味比对</h2>
        </div>
        <button type="button" class="shop-compare__close" id="friendsCompareClose" aria-label="关闭">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="shop-compare__body" id="friendsCompareBody"></div>
    </section>
  </div>

  <!-- 投喂弹窗 -->
  <div class="shop-compare friends-feed" id="friendsFeedPanel" aria-hidden="true">
    <div class="shop-compare__overlay" id="friendsFeedOverlay"></div>
    <section class="shop-compare__sheet" role="dialog" aria-modal="true" aria-labelledby="friendsFeedTitle">
      <div class="shop-compare__header">
        <div>
          <p class="shop-compare__eyebrow">FEED FRIEND</p>
          <h2 class="shop-compare__title" id="friendsFeedTitle">投喂好友</h2>
        </div>
        <button type="button" class="shop-compare__close" id="friendsFeedClose" aria-label="关闭">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="shop-compare__body" id="friendsFeedBody"></div>
    </section>
  </div>

  <!-- 私信聊天界面 -->
  <div class="friends-msg" id="friendsMsg" aria-hidden="true">
    <div class="friends-msg__overlay" id="friendsMsgOverlay"></div>
    <div class="friends-msg__sheet">
      <div class="friends-msg__header">
        <button type="button" class="friends-msg__back" id="friendsMsgBack" aria-label="返回">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>
        <img class="friends-msg__avatar" id="friendsMsgAvatar" src="" alt="">
        <div class="friends-msg__info">
          <div class="friends-msg__name" id="friendsMsgName"></div>
        </div>
        <button type="button" class="friends-msg__close" id="friendsMsgClose" aria-label="关闭">×</button>
      </div>
      <div class="friends-msg__messages" id="friendsMsgMessages"></div>
      <div class="friends-msg__composer">
        <input type="text" class="friends-msg__input" id="friendsMsgInput" placeholder="想说点什么…">
        <button type="button" class="friends-msg__send" id="friendsMsgSend">发送</button>
      </div>
    </div>
  </div>

  <script src="js/data/foods.js"></script>
  <script src="js/data/food-taste-db.js"></script>
  <script src="js/data/food-taste.js"></script>
  <script src="js/data/food-personality.js"></script>
  <script src="js/data/food-selection-codec.js"></script>
  <script src="js/data/food-selection.js"></script>
  <script src="js/modules/dress/config.js"></script>
  <script src="js/modules/dress/state.js"></script>
  <script src="js/data/npc-dress.js"></script>
  <script src="js/data/yummy-code.js"></script>
  <script src="js/fish-coins.js"></script>
  <script src="js/friends.js"></script>
</body>
</html>
